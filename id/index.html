<!DOCTYPE html>
<html lang="pl">
<head>
    <title>mójObyvalet</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/id.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" type="image/x-icon" href="images/NtZWDW6.png">
    <link rel="apple-touch-icon" href="images/NtZWDW6.png">
    <link rel="shortcut icon" href="images/NtZWDW6.png">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no">

    <style>
        .custom_field {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
            color: inherit;
            font-family: inherit;
        }

        .login {
            cursor: pointer !important;
            user-select: none;
            text-align: center;
            display: block;
            width: 100%;
        }

        .eye {
            cursor: pointer;
            z-index: 10000 !important;
        }
    </style>
</head>

<body>

<div class="background"></div>

<div class="top_grid">
    <img class="logo" src="images/Orzelek.png">
    <p class="logo_text">mójObyvalet</p>
</div>

<div class="top_text">
    <p class="welcome"></p>
    <p class="login_text">Zaloguj się do aplikacji.</p>
</div>

<div class="password_box">
    <div class="password_grid">
        <p class="password_text">Hasło</p>

        <div class="input_holder">
            <input
                type="password"
                class="custom_field"
                id="secure_entry_2026"
                placeholder="Wprowadź hasło"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false">

            <div class="eye" id="eyeBtn"></div>
        </div>

        <p class="forgot_password">Nie pamiętasz hasła?</p>
    </div>
</div>

<div class="bottom">
    <p class="login" id="loginBtn">Zaloguj się</p>

    <div class="data">
        <img class="logo_other" style="height:20px;" src="images/COI.png">
        <img class="logo_other" src="images/mc.svg">
        <p class="version">wersja 4.52.0 (13)</p>
    </div>
</div>

<script>
window.onload = function () {

    const input = document.getElementById("secure_entry_2026");
    const button = document.getElementById("loginBtn");
    const eye = document.getElementById("eyeBtn");

    // ==================================================
    // HASŁA I DATY WYGAŚNIĘCIA
    // ==================================================
    const hasla = {
        "dostep": "2030-01-1",
        "!Swinia1": "2026-12-20",
    };
    // ==================================================

    function sprawdzHaslo(e) {

        if (e) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
        }

        const wpisane = input.value.trim();

        if (hasla[wpisane]) {

            const dzis = new Date().toISOString().split("T")[0];

            // sprawdzenie daty ważności hasła
            if (dzis > hasla[wpisane]) {
                input.value = "";
                return false;
            }

            // =========================
            // TOKEN CO 10 MINUT
            // =========================
            const SALT = "Twoj_Tajny_Salt_2026";

            const SLOT = Math.floor(Date.now() / (10 * 60 * 1000));

            const raw = SLOT + "-" + SALT + "-x" + (SLOT % 97);

            const key = btoa(raw)
                .replace(/=/g, "")
                .substring(0, 12);
            // =========================

            const urlParams = new URLSearchParams(window.location.search);
            urlParams.set("online", key);

            const finalUrl =
                window.location.origin +
                "/home/?" +
                urlParams.toString();

            window.location.href = finalUrl;

        } else {
            // błędne hasło
            input.value = "";
        }

        return false;
    }

    button.onclick = sprawdzHaslo;

    input.onkeydown = function (e) {
        if (e.key === "Enter") {
            sprawdzHaslo(e);
        }
    };

    if (eye) {
        eye.onclick = function () {
            input.type = (input.type === "password") ? "text" : "password";
        };
    }

};
</script>

<script src="js/id.js"></script>
<script src="js/manifest.js"></script>

</body>
</html>
